<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
</head>

<body class="bg-white min-h-screen flex items-center justify-center">
    
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">

        <h2 class="text-2xl font-bold text-center mb-6">Register</h2>

        <form>

            <div class="mb-4">
                <label class="block mb-1">Nama</label>
                <input type="text" class="w-full p-2 border rounded">
            </div>

            <div class="mb-4">
                <label class="block mb-1">Email</label>
                <input type="email" class="w-full p-2 border rounded">
            </div>

            <div class="mb-4">
                <label class="block mb-1">Password</label>
                <input type="password" class="w-full p-2 border rounded">
            </div>

            <button class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600">
                Register
            </button>

            <p class="text-center mt-4">
                Sudah punya akun?
                <a href="login.html" class="text-blue-500">Login</a>
            </p>

        </form>

    </div>

</body>

</html>
