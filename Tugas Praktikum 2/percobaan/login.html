<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">

        <h2 class="text-2xl font-bold text-center mb-6">Login</h2>

        <form>
            <input id="email" type="email" placeholder="Email" required class="border p-2 w-full mb-3">

<input type="password" placeholder="Password" required class="border p-2 w-full mb-3">

<button type="submit" class="bg-blue-600 text-white p-2 w-full">
Login
</button>

            <p class="text-center mt-4">
                Belum punya akun?
                <a href="register.html" class="text-blue-500">Register</a>
            </p>

        </form>

    </div>

</body>

</html>
